<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para mi niña 💓</title>
    
    <link rel="icon" type="image/png" href="Imagenes/ball-kirby.png?v=3">
    <link rel="apple-touch-icon" href="Imagenes/ball-kirby.png?v=3">

    <style>
        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            overflow: hidden;
            background-color: #fce4ec;
            font-family: 'Quicksand', sans-serif;
        }

        /* El marco que contiene el sitio */
        #contenedor-principal {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* EL BOTÓN INDIVIDUAL (FLOTANTE) */
        #btn-flotante-mensaje {
            position: fixed;
            bottom: 25px; /* Separado del borde inferior */
            right: 25px;  /* Separado del borde derecho */
            width: 60px;
            height: 60px;
            background-color: #ff69b4;
            color: white;
            border: 3px solid white; /* Borde para que resalte como los otros */
            border-radius: 50%; /* Lo hace un círculo perfecto */
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #btn-flotante-mensaje:active {
            transform: scale(0.9); /* Efecto de click */
        }

        /* Ventana Emergente (Modal) */
        #modal-cartita {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            max-width: 350px;
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            z-index: 1000000;
            text-align: center;
        }

        #modal-cartita p {
            color: #4a3b33;
            line-height: 1.5;
            font-style: italic;
            margin-bottom: 20px;
        }

        #btn-cerrar {
            background: #333;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <iframe src="index.html" id="contenedor-principal"></iframe>

    <button id="btn-flotante-mensaje" onclick="abrirCarta()" title="Mensaje secreto">
        💌
    </button>

    <div id="modal-cartita">
        <p>
            Hola Sofi, quería decirte que te extraño un montoon... ¡Pero aun no pierdo la fe! Se que un día estaremos juntos todo el día. Quiero informarte que el proximo sabado (21 de este mes) ¡ES NUESTRO ANIVERSARIO! 7 meses  especificamente. Eres la niña más bella que han visto mis ojos.
        </p>
        <button id="btn-cerrar" onclick="cerrarCarta()">Cerrar</button>
    </div>

    <script>
        function abrirCarta() {
            document.getElementById('modal-cartita').style.display = 'block';
        }
        function cerrarCarta() {
            document.getElementById('modal-cartita').style.display = 'none';
        }

        // Sincronizador de Títulos (Para que cambie con Kiara y Bonny)
        const frame = document.getElementById('contenedor-principal');
        setInterval(() => {
            try {
                if (frame.contentDocument && frame.contentDocument.title) {
                    if (document.title !== frame.contentDocument.title) {
                        document.title = frame.contentDocument.title;
                    }
                }
            } catch (e) {}
        }, 1000);
    </script>
</body>
</html>
